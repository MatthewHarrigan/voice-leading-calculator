name: Deploy to GitHub Pages

on:
  # Manual-only for now. GitHub Pages isn't available on this repo's current
  # plan/visibility, so auto-running on every push only produced failed runs
  # (and failure-notification emails). Once Pages is enabled — make the repo
  # public or use a plan that allows Pages, then Settings → Pages → Source:
  # GitHub Actions — run this from the Actions tab, or re-add the push trigger.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; skip queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html
      # enablement: true auto-creates the Pages site once the repo supports
      # Pages (public repo, or a plan that allows Pages on private repos).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
