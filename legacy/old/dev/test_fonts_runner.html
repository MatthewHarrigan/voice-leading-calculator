<!DOCTYPE html>
<html>
<head>
    <title>Font Size Test</title>
</head>
<body>
    <h1>Testing Larger Fonts</h1>
    <div id="output"></div>
    <div id="svg-container"></div>
    
    <script type="module">
        import { 
            getChordNotes, 
            createDrop2Voicing, 
            findDrop2Fingering, 
            create6StringChordSVG 
        } from './chord_generator_browser.js';

        const output = document.getElementById('output');
        const svgContainer = document.getElementById('svg-container');
        
        function log(message) {
            const p = document.createElement('p');
            p.textContent = message;
            output.appendChild(p);
        }

        log('Testing chord generation with larger fonts...');

        // Generate a test chord
        const chordNotes = getChordNotes('C', 'maj7');
        const voicing = createDrop2Voicing(chordNotes, 0); // Root inversion
        const fingering = findDrop2Fingering(voicing, 'C');

        if (fingering) {
            fingering.voicing = voicing;
            
            const svg = create6StringChordSVG(
                fingering, 
                'Cmaj7',
                'Cmaj7 Root Inversion',
                'C',
                'maj7'
            );
            
            // Display the SVG
            svgContainer.innerHTML = svg;
            
            // Check font sizes in SVG
            const hasTitleSize18 = svg.includes('font-size: 18px');
            const hasStringSize14 = svg.includes('font-size: 14px');
            const hasFretSize12 = svg.includes('font-size: 12px');
            
            log('Title font size 18px: ' + hasTitleSize18);
            log('String label font size 14px: ' + hasStringSize14);
            log('Fret label font size 12px: ' + hasFretSize12);
            
            if (hasTitleSize18 && hasStringSize14 && hasFretSize12) {
                log('✅ SUCCESS: All font sizes have been increased!');
            } else {
                log('❌ ISSUE: Font sizes not all updated');
            }
            
            // Save SVG to display
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'test_larger_fonts_cmaj7.svg';
            link.textContent = 'Download Test SVG';
            output.appendChild(link);
            
        } else {
            log('❌ Could not generate chord fingering');
        }
    </script>
</body>
</html>
